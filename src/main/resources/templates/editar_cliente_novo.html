<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>
    <style>
        /* === ESTILO BASE COPIADO DO cadastro.html === */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #007BFF;
            color: white;
            padding: 5px 10px;
        }

        header img {
            height: 90px;
        }

        header h1 {
            flex: 1;
            text-align: center;
            margin: 0;
        }

        header button {
            background-color: #fff;
            color: #007BFF;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        form {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        form input,
        form textarea,
        form select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .btn-primary {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            padding: 10px 20px;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            padding: 10px 20px;
        }

        .btn-secondary {
            background-color: #ccc;
            color: #333;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
            padding: 10px 20px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px auto;
            max-width: 800px;
        }

        /* Layout dos checkboxes Conta Caixa / Outros Bancos (igual cadastro.html) */
        .linha {
            display: flex;
            align-items: center;
            gap: 40px;
            white-space: nowrap; /* impede quebra de linha */
        }

        .opcao {
            display: flex;
            align-items: center;
            gap: 8px; /* texto ↔ checkbox */
            cursor: pointer; /* melhor UX */
        }

        .titulo {
            font-weight: bold;
        }

        /* Modal simples de confirmação de exclusão */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: #fff;
            width: 400px;
            max-width: 95vw;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .modal-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
<header>
    <img src="/static/imagens/logo2.png" alt="Logo">
    <h1>Editar Cliente</h1>
    <button type="button" onclick="voltar()">Voltar</button>
</header>

<form id="formEditarCliente">
    <label>Data Entrada:</label>
    <input type="datetime-local" name="DATA_ENTRADA" id="dataEntrada">

    <label>Proponente:</label>
    <input type="text" name="PROPONENTE" id="proponente" required>

    <label>CPF:</label>
    <!-- CPF NÃO editável na edição -->
    <input type="text" id="cpf" name="CPF" maxlength="14" readonly>

    <label>CCA:</label>
    <input type="text" id="cca" name="CCA" maxlength="7" required>

    <label>Número do Contrato:</label>
    <input type="text" id="numContrato" name="NUM_CONTRATO" maxlength="16"
           inputmode="numeric" autocomplete="off" spellcheck="false">

    <label>Valor Financiado:</label>
    <input type="text" id="valorFinanciado" name="VALOR_FINANCIADO" required>

    <label>Status:</label>
    <select id="status" name="STATUS">
        <option value="">Selecione...</option>
        <option value="assinado">Assinado</option>
        <option value="negociado">Negociado</option>
        <option value="em_negociacao">Em Negociação</option>
    </select>

    <label>Modalidade:</label>
    <select id="modalidade" name="MODALIDADE">
        <option value="">Selecione...</option>
        <option value="SBPE - NOVO">SBPE - NOVO</option>
        <option value="CCSBPE - NOVO">CCSBPE - NOVO</option>
        <option value="SBPE - USADO">SBPE - USADO</option>
        <option value="SBPE - LOTE">SBPE - LOTE</option>
        <option value="SBPE - TERRENO CONSTRUÇÃO">SBPE - TERRENO CONSTRUÇÃO</option>
        <option value="SBPE - EMPREENDIMENTO">SBPE - EMPREENDIMENTO</option>
        <option value="SBPE - COMERCIAL USADO">SBPE - COMERCIAL USADO</option>
        <option value="SBPE - CONSTRUÇÃO">SBPE - CONSTRUÇÃO</option>
        <option value="MCMV - NOVO">MCMV - NOVO</option>
        <option value="MCMV - USADO">MCMV - USADO</option>
        <option value="MCMV - CONSTRUÇÃO">MCMV - CONSTRUÇÃO</option>
        <option value="MCMV - NOVO C.MEDIA">MCMV - NOVO C.MEDIA</option>
        <option value="MCMV - NOVO C. MEDIA">MCMV - NOVO C. MEDIA</option>
        <option value="MCMV - FS">MCMV - FS</option>
        <option value="MCMV - TERRENO E CONSTRUÇÃO">MCMV - TERRENO E CONSTRUÇÃO</option>
        <option value="MCMV - empreendimento vila rio do ouro">MCMV - empreendimento vila rio do ouro</option>
        <option value="PMCMV - Imóvel Usado Individual - Classe Média">PMCMV - Imóvel Usado Individual - Classe Média</option>
        <option value="NPMCMV - FS">NPMCMV - FS</option>
        <option value="FGTS - EMPREENDIMENTO">FGTS - EMPREENDIMENTO</option>
        <option value="CIP">CIP</option>
        <option value="CCSBPE - CONSTRUÇÃO">CCSBPE - CONSTRUÇÃO</option>
    </select>

    <label>Reciprocidade:</label>
    <input type="text" name="RECIPROCIDADE" id="reciprocidade">

    <label>Interveniente Quitante:</label>
    <input type="text" name="INTERVENIENTE_QUITANTE" id="intervenienteQuitante">

    <label>Data Devolução Garantia:</label>
    <input type="datetime-local" name="DATA_DEV_GARATIA" id="dataDevGarantia">

    <label>Observações:</label>
    <textarea name="OBS" id="obs"></textarea>

    <label>Nome Vendedor:</label>
    <input type="text" name="NOME_VENDEDOR" id="nomeVendedor">

    <div class="linha">
        <label class="opcao">
            <span class="titulo">Conta Caixa</span>
            <input type="checkbox" class="exclusivo" id="contaCaixa" value="Conta Caixa">
        </label>

        <label class="opcao">
            <span class="titulo">Outros Bancos</span>
            <input type="checkbox" class="exclusivo" id="outrasContas" value="Outros Bancos">
        </label>
    </div>

    <label>Vendedor CPF/CNPJ:</label>
    <input type="text" name="VENDEDOR_CPF_CNPJ" id="vendedorCpfCnpj">
</form>

<div class="buttons">
    <button type="button" class="btn-primary" onclick="salvarCliente()">Salvar alterações</button>
    <button type="button" class="btn-danger" onclick="abrirModalExcluir()">Excluir cliente</button>
    <button type="button" class="btn-secondary" onclick="voltar()">Voltar</button>
</div>

<!-- Modal de confirmação para exclusão -->
<div id="modalExcluir" class="modal">
    <div class="modal-content">
        <p id="mensagemExcluir"></p>
        <div class="modal-buttons">
            <button type="button" class="btn-danger" onclick="excluirCliente()">Sim, excluir</button>
            <button type="button" class="btn-secondary" onclick="fecharModalExcluir()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // =============== Máscaras (baseado no cadastro.html) =================

    function apenasDigitos(str) {
        return (str || '').replace(/\D/g, '');
    }

    // CPF: 000.000.000-00
    function aplicarMascaraCPF(input) {
        let value = apenasDigitos(input.value);
        if (value.length > 11) value = value.slice(0, 11);

        if (value.length <= 3) {
            input.value = value;
        } else if (value.length <= 6) {
            input.value = value.replace(/(\d{3})(\d+)/, '$1.$2');
        } else if (value.length <= 9) {
            input.value = value.replace(/(\d{3})(\d{3})(\d+)/, '$1.$2.$3');
        } else {
            input.value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
        }
    }

    // CCA: 0000-0
    function aplicarMascaraCCA(input) {
        let value = apenasDigitos(input.value);
        if (value.length > 5) value = value.slice(0, 5);
        if (value.length > 4) value = value.replace(/(\d{4})(\d)/, '$1-$2');
        input.value = value;
    }

    // Número do contrato: x.xxxx.xxxxxxx-x (13 dígitos)
    function mascararContrato(digitos) {
        const p1 = digitos.slice(0, 1);
        const p2 = digitos.slice(1, 5);
        const p3 = digitos.slice(5, 12);
        const p4 = digitos.slice(12, 13);
        let out = p1;
        if (p2) out += '.' + p2;
        if (p3) out += '.' + p3;
        if (p4) out += '-' + p4;
        return out;
    }

    function contarDigitosAtePosicao(masked, caretPos) {
        let count = 0;
        for (let i = 0; i < Math.min(caretPos, masked.length); i++) {
            if (/\d/.test(masked[i])) count++;
        }
        return count;
    }

    function posicaoAposNDigitos(masked, n) {
        if (n <= 0) return 0;
        let count = 0;
        for (let i = 0; i < masked.length; i++) {
            if (/\d/.test(masked[i])) {
                count++;
                if (count === n) return i + 1;
            }
        }
        return masked.length;
    }

    function formatarContratoComCursor(e) {
        const input = e.target;
        const valorAntigo = input.value;
        const caretAntigo = input.selectionStart ?? valorAntigo.length;

        const qtdDigitosEsquerda = contarDigitosAtePosicao(valorAntigo, caretAntigo);

        const digitos = apenasDigitos(valorAntigo).slice(0, 13);
        const valorNovo = mascararContrato(digitos);

        if (input.value !== valorNovo) input.value = valorNovo;
        const caretNovo = posicaoAposNDigitos(valorNovo, qtdDigitosEsquerda);
        try {
            input.setSelectionRange(caretNovo, caretNovo);
        } catch (err) {}
    }

    // Valor Financiado: moeda (1.234,56) com base em centavos
    function aplicarMascaraValor(input) {
        let value = apenasDigitos(input.value);

        if (value.length === 0) {
            input.value = '';
            return;
        }

        if (value.length < 3) {
            value = value.padStart(3, '0');
        }

        let inteiro = value.slice(0, -2);
        let centavos = value.slice(-2);

        inteiro = inteiro.replace(/^0+(?!$)/, '');
        inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, '.');

        let formatado = inteiro + ',' + centavos;
        if (formatado.length > 22) {
            formatado = formatado.slice(0, 22);
        }

        input.value = formatado;
    }

    // =============== Funções de utilidade =================

    function formatarCPF(digitos11) {
        const v = apenasDigitos(digitos11);
        if (v.length !== 11) return v;
        return v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    }

    function formatarCCA(digitos) {
        const v = apenasDigitos(digitos);
        if (v.length !== 5) return v;
        return v.replace(/(\d{4})(\d)/, '$1-$2');
    }

    function formatarNumContrato(digitos) {
        const v = apenasDigitos(digitos);
        if (v.length !== 13) return v;
        return mascararContrato(v);
    }

    function formatarValorCentsParaMoeda(centsStr) {
        let valor = apenasDigitos(centsStr);
        if (!valor) return '';
        if (valor.length < 3) valor = valor.padStart(3, '0');
        let inteiro = valor.slice(0, -2);
        let centavos = valor.slice(-2);
        inteiro = inteiro.replace(/^0+(?!$)/, '');
        inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        return inteiro + ',' + centavos;
    }

    // =============== Carregar dados do cliente (como editar_cliente.html) =================

    let cpfUrl = null;   // CPF sem máscara vindo da URL

    async function carregarDadosCliente() {
        try {
            cpfUrl = window.location.pathname.split('/').pop(); // /buscar_cliente/edit/<cpf>
            const response = await fetch(`/api/clientes/${cpfUrl}`);
            if (!response.ok) {
                alert('Erro ao buscar dados do cliente.');
                return;
            }
            const cliente = await response.json();

            // Preenche campos
            document.getElementById('dataEntrada').value = cliente.DATA_ENTRADA || '';
            document.getElementById('proponente').value = cliente.PROPONENTE || '';
            document.getElementById('cpf').value = formatarCPF(cliente.CPF || '');
            document.getElementById('cca').value = formatarCCA(cliente.CCA || '');
            document.getElementById('numContrato').value = formatarNumContrato(cliente.NUM_CONTRATO || '');
            document.getElementById('valorFinanciado').value = formatarValorCentsParaMoeda(cliente.VALOR_FINANCIADO || '');
            document.getElementById('reciprocidade').value = cliente.RECIPROCIDADE || '';
            document.getElementById('intervenienteQuitante').value = cliente.INTERVENIENTE_QUITANTE || '';
            document.getElementById('dataDevGarantia').value = cliente.DATA_DEV_GARATIA || '';
            document.getElementById('obs').value = cliente.OBS || '';
            document.getElementById('nomeVendedor').value = cliente.NOME_VENDEDOR || '';
            document.getElementById('vendedorCpfCnpj').value = cliente.VENDEDOR_CPF_CNPJ || '';

            // Status vem do banco em maiúsculo (ASSINADO, NEGOCIADO, EM_NEGOCIACAO)
            if (cliente.STATUS) {
                const statusVal = cliente.STATUS.toString().toLowerCase(); // "negociado" / "em_negociacao"
                document.getElementById('status').value = statusVal;
            }

            // Modalidade: tenta bater com uma das opções
            if (cliente.MODALIDADE) {
                const selModalidade = document.getElementById('modalidade');
                const valorBanco = cliente.MODALIDADE.toString().toUpperCase();
                let encontrou = false;
                for (const opt of selModalidade.options) {
                    if (opt.value.toUpperCase() === valorBanco) {
                        selModalidade.value = opt.value;
                        encontrou = true;
                        break;
                    }
                }
                if (!encontrou) {
                    selModalidade.value = '';
                }
            }

            // Conta Vendedor -> checkboxes
            const contaVal = (cliente.CONTA_VENDEDOR || '').toUpperCase();
            const cbCaixa = document.getElementById('contaCaixa');
            const cbOutros = document.getElementById('outrasContas');
            cbCaixa.checked = false;
            cbOutros.checked = false;
            if (contaVal.includes('CAIXA')) {
                cbCaixa.checked = true;
            } else if (contaVal.trim() !== '') {
                cbOutros.checked = true;
            }

        } catch (err) {
            console.error('Erro ao carregar cliente:', err);
            alert('Erro ao carregar dados do cliente.');
        }
    }

    // =============== Montar objeto para envio =================

    function montarDadosParaEnvio() {
        const dados = {
            DATA_ENTRADA: document.getElementById('dataEntrada').value || null,
            PROPONENTE: (document.getElementById('proponente').value || '').trim(),
            CPF: apenasDigitos(document.getElementById('cpf').value || ''),
            CCA: apenasDigitos(document.getElementById('cca').value || ''),
            NUM_CONTRATO: apenasDigitos(document.getElementById('numContrato').value || ''),
            VALOR_FINANCIADO: apenasDigitos(document.getElementById('valorFinanciado').value || ''),
            STATUS: (document.getElementById('status').value || '').trim(),
            MODALIDADE: (document.getElementById('modalidade').value || '').trim(),
            RECIPROCIDADE: (document.getElementById('reciprocidade').value || '').trim(),
            INTERVENIENTE_QUITANTE: (document.getElementById('intervenienteQuitante').value || '').trim(),
            DATA_DEV_GARATIA: document.getElementById('dataDevGarantia').value || null,
            OBS: (document.getElementById('obs').value || '').trim(),
            NOME_VENDEDOR: (document.getElementById('nomeVendedor').value || '').trim(),
            CONTA_VENDEDOR: '',
            VENDEDOR_CPF_CNPJ: (document.getElementById('vendedorCpfCnpj').value || '').trim()
        };

        const cbCaixa = document.getElementById('contaCaixa');
        const cbOutros = document.getElementById('outrasContas');
        if (cbCaixa.checked) dados.CONTA_VENDEDOR = 'Conta Caixa';
        else if (cbOutros.checked) dados.CONTA_VENDEDOR = 'Outros Bancos';

        return dados;
    }

    // =============== Salvar (UPDATE) =================

    async function salvarCliente() {
        const dados = montarDadosParaEnvio();

        // Validações básicas (sem exagero)
        if (!dados.PROPONENTE) {
            alert('Proponente é obrigatório.');
            return;
        }
        if (dados.CPF.length !== 11) {
            alert('CPF inválido (precisa ter 11 dígitos).');
            return;
        }
        if (dados.CCA && dados.CCA.length !== 5) {
            alert('CCA deve ter 5 dígitos (formato 0000-0).');
            return;
        }
        if (dados.NUM_CONTRATO && dados.NUM_CONTRATO.length !== 13) {
            alert('Número do Contrato deve ter 13 dígitos.');
            return;
        }

        try {
            const resp = await fetch(`/atualizar_cliente/cpf=${cpfUrl}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (!resp.ok) {
                const erro = await resp.json().catch(() => null);
                console.error('Erro ao atualizar:', erro || resp.statusText);
                alert('Erro ao atualizar cliente.');
                return;
            }

            alert('Cliente atualizado com sucesso!');
            window.location.href = '/buscar_cliente';

        } catch (err) {
            console.error('Erro na requisição de atualização:', err);
            alert('Erro ao atualizar cliente (falha de rede).');
        }
    }

    // =============== Exclusão =================

    function abrirModalExcluir() {
        const proponente = document.getElementById('proponente').value || '';
        const cpfValor = apenasDigitos(document.getElementById('cpf').value || '');
        const cpfMasc = formatarCPF(cpfValor);
        const msg = `Você realmente deseja excluir o cliente ${proponente} do CPF ${cpfMasc}?`;
        document.getElementById('mensagemExcluir').textContent = msg;
        document.getElementById('modalExcluir').style.display = 'flex';
    }

    function fecharModalExcluir() {
        document.getElementById('modalExcluir').style.display = 'none';
    }

    async function excluirCliente() {
        const cpfLimpo = apenasDigitos(document.getElementById('cpf').value || '');
        try {
            const resp = await fetch(`/excluir_cliente/cpf=${cpfLimpo}`, {
                method: 'DELETE'
            });
            if (!resp.ok) {
                alert('Erro ao excluir cliente.');
                return;
            }
            window.location.href = '/homepage?status=excluido';
        } catch (err) {
            console.error('Erro na requisição de exclusão:', err);
            alert('Erro ao excluir cliente (falha de rede).');
        }
    }

    // =============== Navegação =================

    function voltar() {
        window.history.back();
    }

    // Expõe funções no escopo global para usar nos onclick do HTML
    window.salvarCliente = salvarCliente;
    window.voltar = voltar;
    window.abrirModalExcluir = abrirModalExcluir;
    window.fecharModalExcluir = fecharModalExcluir;
    window.excluirCliente = excluirCliente;

    // =============== Inicialização =================

    document.addEventListener('DOMContentLoaded', () => {
        // Máscaras em tempo real
        const cpfInput = document.getElementById('cpf');    // aqui está readonly, então máscara só na carga
        const ccaInput = document.getElementById('cca');
        const contratoInput = document.getElementById('numContrato');
        const valorInput = document.getElementById('valorFinanciado');

        if (ccaInput) {
            ccaInput.addEventListener('input', e => aplicarMascaraCCA(e.target));
        }

        if (contratoInput) {
            contratoInput.addEventListener('input', formatarContratoComCursor);
            contratoInput.addEventListener('paste', () => {
                setTimeout(() => formatarContratoComCursor({ target: contratoInput }), 0);
            });
            contratoInput.addEventListener('blur', () => {
                formatarContratoComCursor({ target: contratoInput });
            });
        }

        if (valorInput) {
            valorInput.addEventListener('input', e => aplicarMascaraValor(e.target));
        }

        // Checkboxes exclusivos (Conta Caixa / Outras Contas)
        const caixas = document.querySelectorAll('.exclusivo');
        caixas.forEach(c => {
            c.addEventListener('change', () => {
                if (c.checked) {
                    caixas.forEach(o => {
                        if (o !== c) o.checked = false;
                    });
                }
            });
        });

        // Carregar dados do cliente a partir do CPF na URL
        carregarDadosCliente();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro Realizado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e6f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .mensagem {
            background-color: #dff0d8;
            color: #3c763d;
            padding: 30px 50px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .mensagem h1 {
            margin: 0;
            font-size: 24px;
        }

        .botao-voltar {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background-color: white;
            color: #3c763d;
            border: 2px solid #3c763d;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .botao-voltar:hover {
            background-color: #f5f5f5;
        }

        .botao button {
            background-color: #4CAF50;
            /* verde */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .botao button:hover {
            background-color: #45a049;
            /* verde mais escuro ao passar o mouse */
        }
    </style>

</head>

<body>
    <div class="mensagem">
        <h1>Cliente cadastrado com sucesso!!</h1>
        </form>

        <form action="/homepage" method="post">
            <div class="botao">
                <button type="submit">Voltar à Página Inicial</button>
            </div>

    </div>

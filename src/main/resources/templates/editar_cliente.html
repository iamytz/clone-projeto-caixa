<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }



        header {
            background-color: #007BFF;
            color: #fff;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            /* Centraliza o conteúdo */
            position: relative;
        }

        .logo {
            max-height: 90px;
            position: absolute;
            left: 15px;
            /* Mantém a logo à esquerda */
        }

        h1 {
            margin: 0;
            font-size: 24px;
        }


        .container {
            width: 80%;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        textarea {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 100%;
        }


        .buttons {
            display: flex;
            justify-content: flex-start;
            /* alinha todos à esquerda */
            gap: 10px;
            /* espaço entre os botões */
            margin-top: 20px;
        }



        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .save-btn {
            background-color: #007BFF;
            color: white;
        }

        .cancel-btn {
            background-color: #ccc;
            color: #333;
        }

        /*========================= BOTÃO EXCLUIR | CANCELAR ============================*/

        .delete-btn {
            background-color: #dc3545;
            /* vermelho */
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 400px;
        }

        .modal-buttons button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <img src="/static/imagens/logo2.png" alt="Logo" class="logo">
            <h1>Editar Cliente</h1>
        </div>
    </header>


    <div class="container">
        <form id="editarClienteForm">

            <label for="dataEntrada">Data de Entrada</label>
            <input type="datetime-local" id="dataEntrada" name="DATA_ENTRADA">

            <label for="proponente">Proponente</label>
            <input type="text" id="proponente" name="PROPONENTE">

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="CPF" readonly maxlength="14">

            <label for="cca">CCA</label>
            <input type="text" id="cca" name="CCA" maxlength="6">

            <label for="numContrato">Número do Contrato</label>
            <input type="text" id="numContrato" name="NUM_CONTRATO" maxlength="16">

            <label for="valorFinanciado">Valor Financiado</label>
            <input type="text" id="valorFinanciado" name="VALOR_FINANCIADO" maxlength="22">

            <label for="status">Status</label>
            <input type="text" id="status" name="STATUS">

            <label for="modalidade">Modalidade</label>
            <input type="text" id="modalidade" name="MODALIDADE">

            <label for="reciprocidade">Reciprocidade</label>
            <input type="text" id="reciprocidade" name="RECIPROCIDADE">

            <label for="intervenienteQuitante">Interveniente Quitante</label>
            <input type="text" id="intervenienteQuitante" name="INTERVENIENTE_QUITANTE">

            <label for="dataDevGarantia">Data Devolução Garantia</label>
            <input type="datetime-local" id="dataDevGarantia" name="DATA_DEV_GARATIA">

            <label for="obs">Observações</label>
            <textarea id="obs" name="OBS" rows="3"></textarea>

            <label for="nomeVendedor">Nome do Vendedor</label>
            <input type="text" id="nomeVendedor" name="NOME_VENDEDOR">

            <label for="contaVendedor">Conta Vendedor</label>
            <input type="text" id="contaVendedor" name="CONTA_VENDEDOR">

            <label for="vendedorCpfCnpj">CPF | CNPJ Vendedor</label>
            <input type="text" id="vendedorCpfCnpj" name="VENDEDOR_CPF_CNPJ">




            <div class="buttons">
                <button type="button" class="save-btn" onclick="salvarCliente()">Salvar</button>
                <button type="button" class="delete-btn" onclick="confirmarExclusao()">Excluir cliente</button>
                <button type="button" class="cancel-btn" onclick="voltar()">Voltar à página anterior</button>
            </div>

        </form>
    </div>

    <div id="modalExcluir" class="modal">
        <div class="modal-content">
            <p id="mensagemExcluir"></p>
            <div class="modal-buttons">
                <button type="button" onclick="excluirCliente()">Sim, excluir</button>
                <button type="button" onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // CPF que vem na URL (sem máscara)
            const cpfUrl = window.location.pathname.split('/').pop();

            // ===== FUNÇÕES DE MÁSCARA =====

            function formatCPF(valor) {
                if (!valor) return '';
                valor = valor.toString().replace(/\D/g, '');
                if (valor.length !== 11) return valor; // se não tiver 11 dígitos, não mascara
                return valor.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            }

            function formatCCA(valor) {
                if (!valor) return '';
                valor = valor.toString().replace(/\D/g, '');
                // padrão xxxx-x
                if (valor.length <= 4) return valor;
                return valor.replace(/(\d{4})(\d)/, '$1-$2');
            }

            function formatNumContrato(valor) {
                if (!valor) return '';
                valor = valor.toString().replace(/\D/g, '');
                // padrão x.xxxx.xxxxxxx-x (1 + 4 + 7 + 1 = 13 dígitos)
                if (valor.length !== 13) return valor; // se vier com tamanho diferente, não mascara
                return valor.replace(/(\d)(\d{4})(\d{7})(\d)/, '$1.$2.$3-$4');
            }

            // valor em centavos (ex: "12345678") -> "123.456,78"
            function formatValorFinanciado(valor) {
                if (valor == null) return '';
                valor = valor.toString().replace(/\D/g, '');
                if (valor === '') return '';

                // Garante pelo menos 2 dígitos para centavos
                if (valor.length === 1) valor = '0' + valor;

                let centavos = valor.slice(-2);
                let inteiro = valor.slice(0, -2);
                if (inteiro === '') inteiro = '0';

                // separador de milhar com ponto
                inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, '.');

                return inteiro + ',' + centavos;
            }

            // Remove tudo que não é número
            function unmaskNumber(str) {
                return (str || '').toString().replace(/\D/g, '');
            }

            // ===== CARREGAR DADOS DA API E APLICAR MÁSCARAS =====

            async function carregarDados() {
                try {
                    const response = await fetch(`/api/clientes/${cpfUrl}`);
                    if (!response.ok) {
                        console.error('Erro ao buscar cliente:', response.status);
                        return;
                    }

                    const cliente = await response.json();

                    const mapaCampos = {
                        "DATA_ENTRADA": "dataEntrada",
                        "PROPONENTE": "proponente",
                        "CPF": "cpf",
                        "CCA": "cca",
                        "NUM_CONTRATO": "numContrato",
                        "VALOR_FINANCIADO": "valorFinanciado",
                        "STATUS": "status",
                        "MODALIDADE": "modalidade",
                        "RECIPROCIDADE": "reciprocidade",
                        "INTERVENIENTE_QUITANTE": "intervenienteQuitante",
                        "DATA_DEV_GARATIA": "dataDevGarantia",
                        "OBS": "obs",
                        "NOME_VENDEDOR": "nomeVendedor",
                        "CONTA_VENDEDOR":"contaVendedor",
                        "VENDEDOR_CPF_CNPJ": "vendedorCpfCnpj"
                    };

                    for (const chave in cliente) {
                        const idCampo = mapaCampos[chave];
                        if (!idCampo) continue;

                        const el = document.getElementById(idCampo);
                        if (!el) continue;

                        let valor = cliente[chave];

                        if (chave === 'CPF') {
                            valor = formatCPF(valor);
                        } else if (chave === 'CCA') {
                            valor = formatCCA(valor);
                        } else if (chave === 'NUM_CONTRATO') {
                            valor = formatNumContrato(valor);
                        } else if (chave === 'VALOR_FINANCIADO') {
                            // Ex.: "12345678" -> "123.456,78"
                            valor = formatValorFinanciado(valor);
                        }

                        el.value = valor;
                    }
                } catch (err) {
                    console.error('Erro ao carregar dados do cliente:', err);
                }
            }

            // ===== APLICAR MÁSCARAS ENQUANTO DIGITA =====

            function aplicarMascarasDigitacao() {
                const cpfInput = document.getElementById('cpf');
                const ccaInput = document.getElementById('cca');
                const numContratoInput = document.getElementById('numContrato');
                const valorFinanciadoInput = document.getElementById('valorFinanciado');

                // Obs: CPF está readonly, esse listener só faria sentido se você tirar o readonly depois
                if (cpfInput) {
                    cpfInput.addEventListener('input', (e) => {
                        e.target.value = formatCPF(e.target.value);
                    });
                }

                if (ccaInput) {
                    ccaInput.addEventListener('input', (e) => {
                        e.target.value = formatCCA(e.target.value);
                    });
                }

                if (numContratoInput) {
                    numContratoInput.addEventListener('input', (e) => {
                        e.target.value = formatNumContrato(e.target.value);
                    });
                }

                if (valorFinanciadoInput) {
                    valorFinanciadoInput.addEventListener('input', (e) => {
                        e.target.value = formatValorFinanciado(e.target.value);
                    });
                }
            }

            // ===== FUNÇÕES CHAMADAS PELOS BOTÕES (EXPOSTAS NO window) =====

            // Salvar (chamado pelo botão onclick="salvarCliente()")
            window.salvarCliente = async function () {
                const form = document.getElementById('editarClienteForm');
                const dados = {};

                for (const input of form.elements) {
                    if (!input.name) continue;

                    let valor = input.value;

                    // Campos que devem ir SOMENTE com dígitos para o backend
                    if (['CPF', 'CCA', 'NUM_CONTRATO', 'VALOR_FINANCIADO'].includes(input.name)) {
                        valor = unmaskNumber(valor); // "123.456,78" -> "12345678"
                    }

                    dados[input.name] = valor;
                }

                try {
                    const response = await fetch(`/atualizar_cliente/cpf=${cpfUrl}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dados)
                    });

                    if (response.ok) {
                        alert('Cliente atualizado com sucesso!');
                        window.location.href = '/buscar_cliente';
                    } else {
                        alert('Erro ao atualizar cliente.');
                    }
                } catch (err) {
                    console.error('Erro na requisição de atualização:', err);
                    alert('Erro ao atualizar cliente (falha de rede).');
                }
            };

            // Voltar (onclick="voltar()")
            window.voltar = function () {
                window.history.back();
            };

            // Confirmar exclusão (onclick="confirmarExclusao()")
            window.confirmarExclusao = function () {
                const proponente = document.getElementById('proponente').value;
                const cpfValor = document.getElementById('cpf').value;
                document.getElementById('mensagemExcluir').textContent =
                    `Você realmente deseja excluir o cliente ${proponente} do CPF ${formatCPF(cpfValor)} da tabela?`;
                document.getElementById('modalExcluir').style.display = 'flex';
            };

            // Fechar modal (onclick="fecharModal()")
            window.fecharModal = function () {
                document.getElementById('modalExcluir').style.display = 'none';
            };

            // Excluir cliente (onclick="excluirCliente()")
            window.excluirCliente = async function () {
                const cpfValor = unmaskNumber(document.getElementById('cpf').value);

                try {
                    const response = await fetch(`/excluir_cliente/cpf=${cpfValor}`, { method: 'DELETE' });
                    if (response.ok) {
                        window.location.href = '/homepage?status=excluido';
                    } else {
                        alert('Erro ao excluir cliente.');
                    }
                } catch (err) {
                    console.error('Erro na requisição de exclusão:', err);
                    alert('Erro ao excluir cliente (falha de rede).');
                }
            };

            // ===== INICIALIZAÇÃO =====

            aplicarMascarasDigitacao();
            carregarDados();
        });
    </script>



</body>

</html>

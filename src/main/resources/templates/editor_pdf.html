<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Editor PDF</title>
</head>

<body>
  <form id="merge-form" action="{{ url_for('juntar_pdf') }}" method="POST" enctype="multipart/form-data">
    <input type="file" name="arquivos" multiple accept=".pdf,image/*">
    <input type="text" name="nome_saida" value="arquivo_unificado.pdf">
    <button type="submit">Juntar e Baixar PDF</button>
  </form>
</body>

</html>

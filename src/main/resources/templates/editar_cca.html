<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar CCA / Contatos</title>
  <link rel="stylesheet" th:href="@{/css/editar_cca.css}" />
</head>
<body>
  <header class="topbar">
    <img th:src="@{img/logo2.png}" alt="Logo" />
    <h1>CCA / Contatos</h1>
    <button type="button" class="btn btn-secondary" onclick="voltar()">Voltar</button>
  </header>

  <main class="container">
    <div class="grid">
      <section class="card">
        <div class="table-toolbar">
          <input id="filtro" type="text" placeholder="Filtrar por CCA, contato, correspondente ou número..." />
          <button class="btn btn-secondary" type="button" onclick="recarregar()">Recarregar</button>
          <span class="pill" id="contador">0 registros</span>
        </div>

        <div class="table-wrap">
          <table aria-label="Tabela de registros de CCA/Contato">
            <thead>
              <tr>
                <th style="width: 90px;">id</th>
                <th style="width: 120px;">cca</th>
                <th>principalContato</th>
                <th>correspondente</th>
                <th style="width: 160px;">numero</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <p id="statusLista" class="status"></p>
      </section>

      <section class="card">
        <h2>Editar registro</h2>
        <form id="formEdicao" autocomplete="off">
          <label for="idCca">id:</label>
          <input id="idCca" name="id" type="text" readonly />
          <div class="hint">Identificador interno.</div>

          <label for="cca">cca:</label>
          <input id="cca" name="cca" type="text" maxlength="7" inputmode="numeric" placeholder="000000" required />
          <div class="hint">6 dígitos, sem máscara ao salvar.</div>

          <label for="principalContato">principalContato:</label>
          <input id="principalContato" name="principalContato" type="text" maxlength="120" required />

          <label for="correspondente">correspondente:</label>
          <input id="correspondente" name="correspondente" type="text" maxlength="120" required />

          <label for="numero">numero:</label>
          <input id="numero" name="numero" type="text" maxlength="16" inputmode="tel" placeholder="(00) 00000-0000" required />

          <div class="buttons">
            <button id="btnSalvar" type="button" class="btn btn-primary" onclick="salvar()" disabled>Salvar alterações</button>
            <button id="btnExcluir" type="button" class="btn btn-danger" onclick="abrirModalExcluir()" disabled>Excluir</button>
            <button id="btnCancelar" type="button" class="btn btn-secondary" onclick="cancelarEdicao()" disabled>Cancelar</button>
          </div>

          <p id="statusEdicao" class="status"></p>
        </form>
      </section>
    </div>
  </main>

  <div id="modalExcluir" class="modal" role="dialog" aria-modal="true" aria-labelledby="tituloModal" aria-describedby="mensagemExcluir">
    <div class="modal-content">
      <h3 id="tituloModal">Confirmar exclusão</h3>
      <p id="mensagemExcluir"></p>
      <div class="modal-buttons">
        <button type="button" class="btn btn-danger" onclick="excluir()">Sim, excluir</button>
        <button type="button" class="btn btn-secondary" onclick="fecharModalExcluir()">Cancelar</button>
      </div>
    </div>
  </div>

  <script th:src="@{/js/editar_cca.js}"></script>
</body>
</html>
